spring.application.name=demo
spring.datasource.url=jdbc:postgresql://localhost:5432/Coffee_Shop
spring.datasource.username=postgres
spring.datasource.password=ADMIN123
spring.datasource.driver-class-name=org.postgresql.Driver

# 2. Crucial Framework Mapping (ADD THESE)
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# 3. Automatic Table Creation (ADD THIS - CRITICAL FOR SAVING DATA)
# "update" tells Spring Boot to look at your Java classes (like Customers, Addresses)
# and automatically create or modify the tables in PostgreSQL on startup.
spring.jpa.hibernate.ddl-auto=update

# 4. Terminal Debugging (Highly Recommended)
# This prints out the actual SQL commands in your console so you can watch
# data being saved, updated, or deleted in real-time.
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true